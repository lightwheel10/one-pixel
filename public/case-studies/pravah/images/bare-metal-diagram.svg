<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" role="img" aria-labelledby="title desc">
  <title id="title">Bare metal server diagram</title>
  <desc id="desc">Dedicated CPU, memory, NVMe and network lanes inside a single bare metal host.</desc>
  <defs>
    <style>
      .frame { fill: rgba(4, 5, 10, 0.02); stroke: rgba(238, 241, 247, 0.2); stroke-width: 1.2; }
      .slot { fill: rgba(91, 140, 255, 0.1); stroke: rgba(91, 140, 255, 0.58); stroke-width: 1.4; }
      .hot { fill: rgba(91, 140, 255, 0.82); }
      .muted { fill: rgba(238, 241, 247, 0.18); }
      .line { stroke: rgba(91, 140, 255, 0.42); stroke-width: 1.2; stroke-dasharray: 10 10; stroke-linecap: round; }
      .label { fill: rgba(238, 241, 247, 0.72); font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 14px; letter-spacing: 0.04em; }
      .label-hot { fill: #6f98ff; }
      .micro { fill: rgba(238, 241, 247, 0.34); font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 10px; letter-spacing: 0.18em; }
    </style>
  </defs>

  <g transform="translate(34 22)">
    <text class="micro" x="0" y="8">DEDICATED HOST</text>
    <text class="micro" x="604" y="8">NOISY NEIGHBOURS: NONE</text>

    <rect class="frame" x="0" y="36" width="752" height="120" />
    <rect class="frame" x="18" y="54" width="716" height="84" />

    <rect class="slot hot" x="40" y="76" width="54" height="38" />
    <text class="label label-hot" x="51" y="99">CPU</text>

    <line class="line" x1="112" y1="95" x2="170" y2="95" />

    <g>
      <rect class="slot" x="170" y="66" width="22" height="58" />
      <rect class="slot" x="202" y="66" width="22" height="58" />
      <rect class="slot" x="234" y="66" width="22" height="58" />
      <rect class="slot" x="266" y="66" width="22" height="58" />
      <text class="label" x="180" y="151">ECC RAM</text>
    </g>

    <line class="line" x1="314" y1="95" x2="372" y2="95" />

    <g>
      <rect class="slot" x="372" y="58" width="52" height="26" />
      <rect class="slot" x="372" y="96" width="52" height="26" />
      <rect class="slot" x="438" y="58" width="52" height="26" />
      <rect class="slot" x="438" y="96" width="52" height="26" />
      <text class="label" x="385" y="151">NVMe RAID</text>
    </g>

    <line class="line" x1="516" y1="95" x2="574" y2="95" />

    <g>
      <rect class="slot" x="574" y="62" width="112" height="66" />
      <rect class="hot" x="596" y="78" width="68" height="8" />
      <rect class="muted" x="596" y="95" width="68" height="5" />
      <rect class="muted" x="596" y="108" width="68" height="5" />
      <text class="label" x="576" y="151">10G NETWORK</text>
    </g>
  </g>
</svg>
