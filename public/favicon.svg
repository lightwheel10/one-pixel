<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Paras: OnePixel mark on a dark tile (matches the dark-default nav logo). Cream main block +
       coral/mint accent pixels so it stays legible on light AND dark browser tabs. -->
  <rect width="24" height="24" rx="4" fill="#0A0A0A"/>
  <g transform="translate(2,2)">
    <rect x="0" y="3" width="13" height="13" fill="#F5F1EA"/>
    <rect x="14" y="4" width="3" height="3" fill="#FF6B47"/>
    <rect x="18" y="3" width="2" height="2" fill="#C7DDD8"/>
    <rect x="14" y="9" width="2" height="2" fill="#F5F1EA"/>
    <rect x="17" y="10" width="3" height="3" fill="#FF6B47"/>
    <rect x="13" y="14" width="2" height="2" fill="#FF6B47"/>
    <rect x="15" y="17" width="2" height="2" fill="#C7DDD8"/>
    <rect x="11" y="18" width="2" height="2" fill="#F5F1EA"/>
  </g>
</svg>
