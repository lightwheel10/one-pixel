<!-- Paras · 2026-06-19: static JSON-LD so crawlers + AI (which don't run our React) understand WHAT
     OnePixel is without rendering the page. Organization + WebSite + FAQPage, linked by @id.
     NOTE: the FAQPage Q&A below must stay verbatim-in-sync with the `qs` array in src/Rest.jsx —
     structured-data guidelines require the markup to match the on-page text. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://onepixel.in/#org",
      "name": "OnePixel",
      "alternateName": "OnePixel Studio",
      "url": "https://onepixel.in/",
      "logo": "https://onepixel.in/favicon.svg",
      "image": "https://onepixel.in/og-image.png",
      "description": "A small, opinionated studio building modern websites for the brands India is building next.",
      "email": "hello@onepixel.in",
      "foundingDate": "2024",
      "areaServed": "IN",
      "knowsAbout": ["Web design", "Web development", "Brand design", "Design systems", "E-commerce"]
    },
    {
      "@type": "WebSite",
      "@id": "https://onepixel.in/#website",
      "url": "https://onepixel.in/",
      "name": "OnePixel",
      "description": "Premium website design & development studio.",
      "inLanguage": "en",
      "publisher": { "@id": "https://onepixel.in/#org" }
    },
    {
      "@type": "FAQPage",
      "@id": "https://onepixel.in/#faq",
      "mainEntity": [
        { "@type": "Question", "name": "How do you scope a project?", "acceptedAnswer": { "@type": "Answer", "text": "Every project starts with a 60-minute discovery call. We listen, understand the work ahead, and send a detailed proposal scoped to your reality — not a templated rate card. The first call is on us, with no commitment to take it further." } },
        { "@type": "Question", "name": "How long does it take?", "acceptedAnswer": { "@type": "Answer", "text": "Marketing sites typically take 4–6 weeks. Larger brand-and-build engagements run 6–10 weeks. We start one new project per month and protect that pace fiercely." } },
        { "@type": "Question", "name": "Do you work with our existing design or dev team?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — we love embedded engagements. We can lead, support, or hand off. We’ve shipped alongside in-house teams from early-stage Bangalore startups to listed companies." } },
        { "@type": "Question", "name": "What stack do you build on?", "acceptedAnswer": { "@type": "Answer", "text": "Webflow when speed matters and a non-engineer should be able to update copy. Next.js + Sanity / Contentful when the site has product surface area. We pick the right tool, not the trendy one." } },
        { "@type": "Question", "name": "Do you offer ongoing care?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every project includes 30 days of post-launch tuning. After that, we offer monthly retainers for design and engineering — most clients keep us on for 6–12 months." } },
        { "@type": "Question", "name": "Why “OnePixel”?", "acceptedAnswer": { "@type": "Answer", "text": "Because the difference between average and exceptional is usually one pixel — repeated, obsessively, across every screen. That’s the bar." } }
      ]
    }
  ]
}
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
