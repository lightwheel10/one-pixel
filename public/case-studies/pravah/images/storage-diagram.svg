<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" role="img" aria-labelledby="title desc">
  <title id="title">Block and object storage diagram</title>
  <desc id="desc">Application data flows into block volumes and object buckets with replicated durable storage.</desc>
  <defs>
    <style>
      .box { fill: rgba(4, 5, 10, 0.02); stroke: rgba(238, 241, 247, 0.2); stroke-width: 1.2; }
      .box-hot { fill: rgba(91, 140, 255, 0.12); stroke: rgba(91, 140, 255, 0.68); stroke-width: 1.4; }
      .bucket { fill: rgba(91, 140, 255, 0.1); stroke: rgba(91, 140, 255, 0.56); stroke-width: 1.4; }
      .line { fill: none; stroke: rgba(91, 140, 255, 0.42); stroke-width: 1.4; stroke-dasharray: 14 12; stroke-linecap: round; }
      .solid { fill: none; stroke: rgba(143, 180, 255, 0.72); stroke-width: 1.7; stroke-linecap: round; }
      .node { fill: #5b8cff; opacity: 0.9; }
      .label { fill: rgba(238, 241, 247, 0.72); font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 14px; letter-spacing: 0.04em; }
      .label-hot { fill: #6f98ff; }
      .micro { fill: rgba(238, 241, 247, 0.34); font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 10px; letter-spacing: 0.18em; }
    </style>
  </defs>

  <g transform="translate(36 24)">
    <text class="micro" x="0" y="8">DURABLE STORAGE</text>
    <text class="micro" x="596" y="8">REPLICATED INSIDE INDIA</text>

    <rect class="box" x="0" y="66" width="102" height="48" />
    <text class="label" x="30" y="95">App</text>

    <path class="solid" d="M102 90 H176" />
    <circle class="node" cx="139" cy="90" r="3" />

    <rect class="box-hot" x="176" y="44" width="156" height="44" />
    <text class="label label-hot" x="206" y="72">Block volume</text>

    <rect class="box-hot" x="176" y="104" width="156" height="44" />
    <text class="label label-hot" x="214" y="132">Object bucket</text>

    <path class="line" d="M332 66 C382 66 392 38 444 38" />
    <path class="line" d="M332 126 C382 126 392 144 444 144" />
    <path class="solid" d="M332 96 H426" />
    <circle class="node" cx="380" cy="96" r="3" />

    <g transform="translate(444 22)">
      <rect class="bucket" x="0" y="0" width="74" height="38" />
      <rect class="bucket" x="92" y="0" width="74" height="38" />
      <rect class="bucket" x="184" y="0" width="74" height="38" />

      <rect class="bucket" x="0" y="58" width="74" height="38" />
      <rect class="bucket" x="92" y="58" width="74" height="38" />
      <rect class="bucket" x="184" y="58" width="74" height="38" />

      <rect class="bucket" x="0" y="116" width="74" height="38" />
      <rect class="bucket" x="92" y="116" width="74" height="38" />
      <rect class="bucket" x="184" y="116" width="74" height="38" />

      <text class="label" x="10" y="180">AZ-1</text>
      <text class="label" x="102" y="180">AZ-2</text>
      <text class="label" x="194" y="180">AZ-3</text>
    </g>
  </g>
</svg>
